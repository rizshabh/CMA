<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fee Management - Tuition Class Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: #f8f9fa;
            min-height: 100vh;
        }
        table {
            background: white;
            box-shadow: 0 8px 25px rgb(0 0 0 / 0.1);
            border-radius: 10px;
            overflow: hidden;
            margin-top: 2rem;
        }
        thead {
            background-color: #0d6efd;
            color: white;
        }
        tbody tr:hover {
            background-color: #f1f8ff;
            cursor: pointer;
        }
        footer {
            text-align: center;
            padding: 20px 0;
            background: #0d6efd;
            color: white;
        }
    </style>
</head>
<body>
    <div id="navbar-placeholder"></div>

    <main class="container mt-5">
        <h1 class="mb-4 text-primary">Fee Management</h1>

        <section>
            <h3 class="mt-5">Fee Records</h3>
            <button class="btn btn-primary mb-3" onclick="addFeeRecord()">Add Fee Record</button>
            <table class="table table-hover" id="feeTable">
                <thead>
                    <tr>
                        <th>Student ID</th>
                        <th>Student Name</th>
                        <th>Fee Amount</th>
                        <th>Payment Date</th>
                        <th>Payment Status</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </section>
    </main>

    <footer>
        <p>&copy; 2023 Tuition Class Management. All rights reserved.</p>
    </footer>

    <script>
        // Navbar injection script
        const navHTML = `
        <nav class="navbar navbar-expand-lg navbar-light bg-light sticky-top shadow-sm">
            <div class="container-fluid">
                <a class="navbar-brand" href="index.html">Tuition Class Management</a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" 
                    aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarNav">
                    <ul class="navbar-nav">
                        <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                        <li class="nav-item"><a class="nav-link" href="login.html">Login</a></li>
                        <li class="nav-item"><a class="nav-link" href="student-registration.html">Register</a></li>
                        <li class="nav-item"><a class="nav-link" href="admin-dashboard.html">Admin Dashboard</a></li>
                        <li class="nav-item"><a class="nav-link active" href="fee-management.html">Fee Management</a></li>
                        <li class="nav-item"><a class="nav-link" href="contact.html">Contact</a></li>
                        <li class="nav-item"><a class="nav-link" href="student-portal.html">Student Portal</a></li>
                    </ul>
                </div>
            </div>
        </nav>`;
        document.getElementById('navbar-placeholder').innerHTML = navHTML;

        // Load fee records from localStorage
        function loadFeeRecords() {
            const feeRecords = JSON.parse(localStorage.getItem('feeRecords')) || [];
            const feeTableBody = document.querySelector('#feeTable tbody');
            feeTableBody.innerHTML = ''; // Clear existing rows

            feeRecords.forEach((record, index) => {
                const row = `
                    <tr>
                        <td>${record.studentId}</td>
                        <td>${record.studentName}</td>
                        <td>${record.feeAmount}</td>
                        <td>${record.paymentDate}</td>
                        <td>${record.paymentStatus}</td>
                        <td>
                            <button class="btn btn-warning btn-sm" onclick="editFeeRecord(${index})">Edit</button>
                            <button class="btn btn-danger btn-sm" onclick="deleteFeeRecord(${index})">Delete</button>
                        </td>
                    </tr>
                `;
                feeTableBody.innerHTML += row;
            });
        }

        // Add a new fee record
        function addFeeRecord() {
            const studentId = prompt("Enter Student ID:");
            const studentName = prompt("Enter Student Name:");
            const feeAmount = prompt("Enter Fee Amount:");
            const paymentDate = prompt("Enter Payment Date (YYYY-MM-DD):");
            const paymentStatus = prompt("Enter Payment Status (Paid/Pending):");

            const feeRecords = JSON.parse(localStorage.getItem('feeRecords')) || [];
            feeRecords.push({ studentId, studentName, feeAmount, paymentDate, paymentStatus });
            localStorage.setItem('feeRecords', JSON.stringify(feeRecords));
            loadFeeRecords();
        }

        // Edit a fee record
        function editFeeRecord(index) {
            const feeRecords = JSON.parse(localStorage.getItem('feeRecords')) || [];
            const record = feeRecords[index];

            const studentId = prompt("Edit Student ID:", record.studentId);
            const studentName = prompt("Edit Student Name:", record.studentName);
            const feeAmount = prompt("Edit Fee Amount:", record.feeAmount);
            const paymentDate = prompt("Edit Payment Date (YYYY-MM-DD):", record.paymentDate);
            const paymentStatus = prompt("Edit Payment Status (Paid/Pending):", record.paymentStatus);

            feeRecords[index] = { studentId, studentName, feeAmount, paymentDate, paymentStatus };
            localStorage.setItem('feeRecords', JSON.stringify(feeRecords));
            loadFeeRecords();
        }

        // Delete a fee record
        function deleteFeeRecord(index) {
            const feeRecords = JSON.parse(localStorage.getItem('feeRecords')) || [];
            feeRecords.splice(index, 1);
            localStorage.setItem('feeRecords', JSON.stringify(feeRecords));
            loadFeeRecords();
        }

        // Load fee records on page load
        document.addEventListener('DOMContentLoaded', loadFeeRecords);
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
