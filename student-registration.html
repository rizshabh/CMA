<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Student Registration - Tuition Class Management</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <style>
    body {
      background: #f8f9fa;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    main {
      flex-grow: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 30px;
    }
    form {
      max-width: 600px;
      width: 100%;
      background: white;
      padding: 25px;
      border-radius: 12px;
      box-shadow: 0 8px 25px rgb(0 0 0 / 0.1);
    }
    form h2 {
      margin-bottom: 20px;
      color: #0d6efd;
      font-weight: 700;
      text-align: center;
    }
  </style>
</head>
<body>
<div id="navbar-placeholder"></div>

<main>
  <form id="registrationForm" novalidate>
    <h2>Student Registration</h2>
    <div class="mb-3">
      <label for="fullName" class="form-label">Full Name *</label>
      <input type="text" class="form-control" id="fullName" required />
      <div class="invalid-feedback">Please enter your full name</div>
    </div>
<div class="mb-3">
  <label for="contactNumber" class="form-label">Contact Number *</label>
  <input type="tel" class="form-control" id="contactNumber" pattern="^\+?[0-9]{7,15}$" placeholder="+1234567890" required />
  <div class="invalid-feedback">Please enter a valid contact number (7-15 digits)</div>
</div>
    <div class="mb-3">
      <label for="emailAddress" class="form-label">Email *</label>
      <input type="email" class="form-control" id="emailAddress" required />
      <div class="invalid-feedback">Please enter a valid email address</div>
    </div>
    <div class="mb-3">
      <label for="address" class="form-label">Address *</label>
      <textarea class="form-control" id="address" rows="2" required></textarea>
      <div class="invalid-feedback">Please enter your address</div>
    </div>
    <div class="mb-3">
      <label for="courseSelection" class="form-label">Select Course *</label>
      <select class="form-select" id="courseSelection" required>
        <option value="" selected disabled>Choose a course</option>
        <option value="Mathematics">Mathematics</option>
        <option value="Physics">Physics</option>
        <option value="Chemistry">Chemistry</option>
        <option value="Biology">Biology</option>
        <option value="English">English</option>
      </select>
      <div class="invalid-feedback">Please select a course</div>
    </div>
    <div class="mb-3">
      <label for="dob" class="form-label">Date of Birth *</label>
      <input type="date" class="form-control" id="dob" required max="" />
      <div class="invalid-feedback">Please enter your date of birth</div>
    </div>

    <div class="mb-3 text-center" id="studentIdContainer" style="display:none;">
      <div class="alert alert-success">Registration Successful! Your Student ID is: <strong id="studentIdDisplay"></strong></div>
    </div>

    <button type="submit" class="btn btn-primary w-100">Register</button>
  </form>
</main>

<script>
  // Navbar injection script
  const navHTML = `
  <nav class="navbar navbar-expand-lg navbar-light bg-light sticky-top shadow-sm">
    <div class="container-fluid">
      <a class="navbar-brand" href="index.html">Tuition Class Management</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" 
        data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" 
        aria-label="Toggle navigation"><span class="navbar-toggler-icon"></span></button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav">
          <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
          <li class="nav-item"><a class="nav-link" href="login.html">Login</a></li>
          <li class="nav-item"><a class="nav-link active" href="student-registration.html">Register</a></li>
          <li class="nav-item"><a class="nav-link" href="admin-dashboard.html">Admin Dashboard</a></li>
          <li class="nav-item"><a class="nav-link" href="fee-management.html">Fee Management</a></li>
          <li class="nav-item"><a class="nav-link" href="contact.html">Contact</a></li>
          <li class="nav-item"><a class="nav-link" href="student-portal.html">Student Portal</a></li>
        </ul>
      </div>
    </div>
  </nav>`;
  document.getElementById('navbar-placeholder').innerHTML = navHTML;

  // Set max DOB as today
  const dobInput = document.getElementById('dob');
  dobInput.max = new Date().toISOString().split("T")[0];

  document.getElementById('registrationForm').addEventListener('submit', function(e) {
    e.preventDefault();
    e.stopPropagation();

    if (!this.checkValidity()) {
      this.classList.add('was-validated');
      return;
    }

    // Collect form data
    const studentData = {
      fullName: document.getElementById('fullName').value.trim(),
      contactNumber: document.getElementById('contactNumber').value.trim(),
      emailAddress: document.getElementById('emailAddress').value.trim(),
      address: document.getElementById('address').value.trim(),
      courseSelection: document.getElementById('courseSelection').value,
      dob: document.getElementById('dob').value,
      studentId: 'T' + Date.now().toString().slice(-6) + Math.floor(100 + Math.random() * 900), // Generate Student ID
    };

    // Save to localStorage
    let students = JSON.parse(localStorage.getItem('students')) || [];
    students.push(studentData);
    localStorage.setItem('students', JSON.stringify(students));

    // Show success message
    document.getElementById('studentIdDisplay').textContent = studentData.studentId;
    document.getElementById('studentIdContainer').style.display = 'block';

    // Reset form except student ID message
    this.reset();
    this.classList.remove('was-validated');
  });
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
