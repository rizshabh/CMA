<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Fee Payment - Tuition Class Management</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script> <!-- QR code lib -->
  <style>
    body {
      background: #f8f9fa;
      min-height: 100vh;
      padding: 20px;
      max-width: 900px;
      margin: auto;
    }
    #studentDetails {
      margin-top: 1rem;
      padding: 15px;
      background: white;
      border-radius: 10px;
      box-shadow: 0 8px 25px rgb(0 0 0 / 0.1);
    }
    #qrCode {
      margin-top: 20px;
      text-align: center;
    }
  </style>
</head>
<body>
  <h1 class="mb-4 text-primary">Fee Payment</h1>

  <label for="studentSelect" class="form-label">Select Student</label>
  <select id="studentSelect" class="form-select">
    <option value="">-- Select Student --</option>
  </select>

  <div id="studentDetails" style="display:none;">
    <h4>Student Details</h4>
    <p><strong>ID:</strong> <span id="detailStudentId"></span></p>
    <p><strong>Name:</strong> <span id="detailFullName"></span></p>
    <p><strong>Contact:</strong> <span id="detailContact"></span></p>
    <p><strong>Email:</strong> <span id="detailEmail"></span></p>
    <p><strong>Course:</strong> <span id="detailCourse"></span></p>
    <p><strong>Date of Birth:</strong> <span id="detailDob"></span></p>

    <label for="paymentAmount" class="form-label mt-3">Payment Amount</label>
    <input type="number" id="paymentAmount" class="form-control" placeholder="Enter amount" min="1" />

    <button id="generateQR" class="btn btn-primary mt-3">Generate Payment QR Code</button>

    <div id="qrCode"></div>
  </div>

  <script>
    const studentSelect = document.getElementById('studentSelect');
    const studentDetails = document.getElementById('studentDetails');
    const detailStudentId = document.getElementById('detailStudentId');
    const detailFullName = document.getElementById('detailFullName');
    const detailContact = document.getElementById('detailContact');
    const detailEmail = document.getElementById('detailEmail');
    const detailCourse = document.getElementById('detailCourse');
    const detailDob = document.getElementById('detailDob');
    const paymentAmount = document.getElementById('paymentAmount');
    const generateQR = document.getElementById('generateQR');
    const qrCodeDiv = document.getElementById('qrCode');

    // Load students from localStorage and populate dropdown
    function loadStudents() {
      const students = JSON.parse(localStorage.getItem('students')) || [];
      students.forEach(student => {
        const option = document.createElement('option');
        option.value = student.studentId;
        option.textContent = `${student.fullName} (${student.studentId})`;
        studentSelect.appendChild(option);
      });
    }

    // Show selected student details
    function showStudentDetails(studentId) {
      const students = JSON.parse(localStorage.getItem('students')) || [];
      const student = students.find(s => s.studentId === studentId);
      if (student) {
        studentDetails.style.display = 'block';
        detailStudentId.textContent = student.studentId;
        detailFullName.textContent = student.fullName;
        detailContact.textContent = student.contactNumber;
        detailEmail.textContent = student.emailAddress;
        detailCourse.textContent = student.courseSelection;
        detailDob.textContent = student.dob;
        qrCodeDiv.innerHTML = '';
        paymentAmount.value = '';
      } else {
        studentDetails.style.display = 'none';
      }
    }

    // Generate QR code for payment info
    generateQR.addEventListener('click', () => {
      const amount = paymentAmount.value;
      if (!amount || amount <= 0) {
        alert('Please enter a valid payment amount');
        return;
      }
      const paymentInfo = {
        studentId: detailStudentId.textContent,
        studentName: detailFullName.textContent,
        amount: amount,
        date: new Date().toLocaleDateString()
      };
      const qrText = `Payment Details\nStudent ID: ${paymentInfo.studentId}\nName: ${paymentInfo.studentName}\nAmount: $${paymentInfo.amount}\nDate: ${paymentInfo.date}`;
      qrCodeDiv.innerHTML = '';
      QRCode.toCanvas(qrCodeDiv, qrText, { width: 200 }, function (error) {
        if (error) console.error(error);
      });
    });

    // Event: When user selects student
    studentSelect.addEventListener('change', (e) => {
      showStudentDetails(e.target.value);
    });

    // Load students on page load
    document.addEventListener('DOMContentLoaded', loadStudents);
  </script>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
